<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ami 3D Adventure</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}
</style>

</head>

<body>

<div id="ui">Score: <span id="score">0</span></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)
let renderer = new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.z = 5
camera.position.y = 5
camera.rotation.x = -0.6

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,7)
scene.add(light)

let floorGeo = new THREE.PlaneGeometry(50,50)
let floorMat = new THREE.MeshStandardMaterial({color:0x333333})
let floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
scene.add(floor)

let playerGeo = new THREE.BoxGeometry(1,1,1)
let playerMat = new THREE.MeshStandardMaterial({color:0x00ff00})
let player = new THREE.Mesh(playerGeo,playerMat)

player.position.y = 0.5
scene.add(player)

let coins=[]
let score=0

function spawnCoin(){

let geo = new THREE.CylinderGeometry(0.3,0.3,0.1,20)
let mat = new THREE.MeshStandardMaterial({color:0xffff00})
let coin = new THREE.Mesh(geo,mat)

coin.rotation.x = Math.PI/2
coin.position.set((Math.random()-0.5)*20,0.3,(Math.random()-0.5)*20)

scene.add(coin)
coins.push(coin)

}

for(let i=0;i<10;i++) spawnCoin()

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function update(){

if(keys["ArrowUp"]) player.position.z-=0.1
if(keys["ArrowDown"]) player.position.z+=0.1
if(keys["ArrowLeft"]) player.position.x-=0.1
if(keys["ArrowRight"]) player.position.x+=0.1

coins.forEach((c,i)=>{

let dx=player.position.x-c.position.x
let dz=player.position.z-c.position.z
let dist=Math.sqrt(dx*dx+dz*dz)

if(dist<1){

scene.remove(c)
coins.splice(i,1)

score++
document.getElementById("score").textContent=score

spawnCoin()

}

})

}

function animate(){

requestAnimationFrame(animate)

update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
