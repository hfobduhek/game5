<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ami Shooter</title>

<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#000;
display:block;
margin:auto;
border:2px solid white;
}

#ui{
margin:10px;
font-size:20px;
}
</style>
</head>

<body>

<h1>Ami Shooter 🚀</h1>
<div id="ui">
Score: <span id="score">0</span>
HP: <span id="hp">5</span>
</div>

<canvas id="game" width="500" height="600"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let keys={}
let bullets=[]
let enemies=[]
let particles=[]

let score=0
let hp=5
let gameOver=false

const player={
x:250,
y:550,
w:40,
h:20,
speed:6
}

document.addEventListener("keydown",e=>{
keys[e.key]=true

if(e.key===" "){
bullets.push({x:player.x+18,y:player.y})
}
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function spawnEnemy(){

enemies.push({
x:Math.random()*460,
y:-20,
w:30,
h:30,
speed:2+Math.random()*2
})

}

setInterval(spawnEnemy,1000)

function explosion(x,y){

for(let i=0;i<10;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:30
})

}

}

function update(){

if(gameOver) return

if(keys["ArrowLeft"]) player.x-=player.speed
if(keys["ArrowRight"]) player.x+=player.speed

player.x=Math.max(0,Math.min(460,player.x))

bullets.forEach(b=>b.y-=8)

enemies.forEach(e=>e.y+=e.speed)

particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
p.life--
})

particles=particles.filter(p=>p.life>0)

bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{

if(
b.x < e.x+e.w &&
b.x+4 > e.x &&
b.y < e.y+e.h &&
b.y+10 > e.y
){

explosion(e.x,e.y)

bullets.splice(bi,1)
enemies.splice(ei,1)

score+=10
document.getElementById("score").textContent=score

}

})
})

enemies.forEach((e,ei)=>{

if(e.y>600){

enemies.splice(ei,1)
hp--

document.getElementById("hp").textContent=hp

if(hp<=0){

gameOver=true

}

}

})

}

function draw(){

ctx.clearRect(0,0,500,600)

ctx.fillStyle="lime"
ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,4,10)
})

ctx.fillStyle="red"
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,e.w,e.h)
})

ctx.fillStyle="orange"
particles.forEach(p=>{
ctx.fillRect(p.x,p.y,3,3)
})

if(gameOver){

ctx.fillStyle="white"
ctx.font="40px sans-serif"
ctx.fillText("GAME OVER",140,300)

ctx.font="20px sans-serif"
ctx.fillText("Score: "+score,200,340)

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
