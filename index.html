<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ami Zombie Survival</title>

<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#111;
display:block;
margin:auto;
border:2px solid white;
}

#ui{
font-size:20px;
margin:10px;
}
</style>
</head>

<body>

<h1>Ami Zombie Survival 🧟</h1>

<div id="ui">
Score: <span id="score">0</span>
HP: <span id="hp">5</span>
</div>

<canvas id="game" width="600" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
let bullets=[]
let enemies=[]

let score=0
let hp=5
let gameOver=false

const player={
x:300,
y:250,
size:20,
speed:4
}

document.addEventListener("keydown",e=>{
keys[e.key]=true

if(e.key===" "){
bullets.push({x:player.x,y:player.y})
}

})

document.addEventListener("keyup",e=>keys[e.key]=false)

function spawnEnemy(){

enemies.push({
x:Math.random()*600,
y:Math.random()*500,
speed:1+Math.random()*1.5
})

}

setInterval(spawnEnemy,1200)

function update(){

if(gameOver)return

if(keys["w"])player.y-=player.speed
if(keys["s"])player.y+=player.speed
if(keys["a"])player.x-=player.speed
if(keys["d"])player.x+=player.speed

bullets.forEach(b=>{
b.y-=6
})

bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{

let dx=b.x-e.x
let dy=b.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<15){

enemies.splice(ei,1)
bullets.splice(bi,1)

score+=10
document.getElementById("score").textContent=score

}

})
})

enemies.forEach((e,ei)=>{

let dx=player.x-e.x
let dy=player.y-e.y
let dist=Math.sqrt(dx*dx+dy*dy)

e.x+=dx/dist*e.speed
e.y+=dy/dist*e.speed

if(dist<20){

hp--
document.getElementById("hp").textContent=hp

enemies.splice(ei,1)

if(hp<=0){

gameOver=true

}

}

})

}

function draw(){

ctx.clearRect(0,0,600,500)

ctx.fillStyle="lime"
ctx.fillRect(player.x,player.y,20,20)

ctx.fillStyle="yellow"
bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,4,10)
})

ctx.fillStyle="red"
enemies.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x,e.y,10,0,Math.PI*2)
ctx.fill()
})

if(gameOver){

ctx.fillStyle="white"
ctx.font="40px sans-serif"
ctx.fillText("GAME OVER",200,250)

}

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
